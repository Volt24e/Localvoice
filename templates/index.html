<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalVoice - Anonymous Community Issues</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.95; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 100px; }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .file-label:hover { background: #e0e0e0; }
        .preview { margin-top: 15px; max-width: 100%; border-radius: 12px; display: none; }
        .preview.active { display: block; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .issues-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }
        .admin-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid white;
            cursor: pointer;
            color: white;
        }
        .issue-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .issue-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .issue-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
        }
        .issue-location {
            background: #667eea20;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .issue-description { color: #666; margin: 15px 0; line-height: 1.5; }
        .issue-media { margin: 15px 0; border-radius: 12px; overflow: hidden; }
        .issue-media img, .issue-media video { max-width: 100%; max-height: 400px; border-radius: 12px; }
        .issue-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        .vote-area { display: flex; align-items: center; gap: 10px; }
        .vote-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            width: auto;
            font-size: 0.9rem;
        }
        .vote-count { font-weight: 700; color: #667eea; font-size: 1.1rem; }
        .timestamp { font-size: 0.8rem; color: #999; }
        .delete-btn { background: #ff4444; padding: 6px 12px; width: auto; font-size: 0.8rem; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .admin-panel {
            display: none;
            background: rgba(0,0,0,0.95);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }
        .admin-panel.active { display: flex; align-items: center; justify-content: center; }
        .admin-content {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 25px;
            border-radius: 20px;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .issue-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📢 LocalVoice</h1>
            <p>Report issues in your area anonymously • Share photos/videos • Get community support</p>
        </div>
        <div class="card">
            <h2 style="margin-bottom: 20px;">Report an Issue</h2>
            <form id="issueForm">
                <div class="form-group">
                    <label>Issue Title *</label>
                    <input type="text" id="title" required placeholder="e.g., Pothole on Main Street">
                </div>
                <div class="form-group">
                    <label>Location (Area/Street) *</label>
                    <input type="text" id="location" required placeholder="e.g., Downtown, Sector 5">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" required placeholder="Describe the issue in detail..."></textarea>
                </div>
                <div class="form-group">
                    <label>Upload Photo or Video (Optional, max 50MB)</label>
                    <div class="file-input-wrapper">
                        <div class="file-label" onclick="document.getElementById('fileInput').click()">
                            📸 Click to upload media
                        </div>
                        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
                    </div>
                    <div id="preview" class="preview"></div>
                </div>
                <button type="submit">🚀 Post Anonymously</button>
            </form>
        </div>
        <div class="issues-header">
            <h2>Community Reports</h2>
            <button class="admin-btn" onclick="toggleAdmin()">🔐 Admin</button>
        </div>
        <div id="issuesList"></div>
    </div>
    <div id="adminPanel" class="admin-panel">
        <div class="admin-content">
            <h3>Admin Access</h3>
            <input type="password" id="adminKey" placeholder="Enter admin key" style="margin: 15px 0;">
            <button onclick="enableAdminMode()">Verify & Enable Delete</button>
            <button onclick="toggleAdmin()" style="margin-top: 10px; background: #999;">Cancel</button>
        </div>
    </div>
    <script>
        const API_URL = window.location.origin;
        let adminMode = false;
        async function loadIssues() {
            try {
                const response = await fetch(`${API_URL}/api/issues`);
                const issues = await response.json();
                displayIssues(issues);
            } catch (error) {
                console.error('Error loading issues:', error);
                showToast('Failed to load issues');
            }
        }
        function displayIssues(issues) {
            const container = document.getElementById('issuesList');
            if (issues.length === 0) {
                container.innerHTML = '<div class="card" style="text-align: center;">No issues reported yet. Be the first! 🎉</div>';
                return;
            }
            container.innerHTML = issues.map(issue => `
                <div class="issue-card" data-id="${issue.id}">
                    <div class="issue-title">
                        <span>🔍 ${escapeHtml(issue.title)}</span>
                        <span class="issue-location">📍 ${escapeHtml(issue.location)}</span>
                    </div>
                    <div class="issue-description">${escapeHtml(issue.description)}</div>
                    ${issue.file_url ? `
                        <div class="issue-media">
                            ${issue.file_type === 'image' ? 
                                `<img src="${issue.file_url}" alt="Issue media" loading="lazy">` : 
                                `<video controls src="${issue.file_url}"></video>`
                            }
                        </div>
                    ` : ''}
                    <div class="issue-footer">
                        <div class="vote-area">
                            <button class="vote-btn" onclick="voteIssue('${issue.id}')">👍 Upvote</button>
                            <span class="vote-count">${issue.votes} votes</span>
                        </div>
                        <div class="timestamp">${new Date(issue.timestamp).toLocaleString()}</div>
                        ${adminMode ? `<button class="vote-btn delete-btn" onclick="deleteIssue('${issue.id}')">🗑️ Delete</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
        async function voteIssue(issueId) {
            try {
                const response = await fetch(`${API_URL}/api/issues/${issueId}/vote`, { method: 'POST' });
                if (response.ok) {
                    loadIssues();
                    showToast('Vote recorded!');
                }
            } catch (error) {
                console.error('Error voting:', error);
            }
        }
        async function deleteIssue(issueId) {
            if (!confirm('Delete this issue?')) return;
            try {
                const response = await fetch(`${API_URL}/api/issues/${issueId}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': localStorage.getItem('adminKey') || '' }
                });
                if (response.ok) {
                    loadIssues();
                    showToast('Issue deleted');
                } else {
                    showToast('Unauthorized or error');
                }
            } catch (error) {
                console.error('Error deleting:', error);
            }
        }
        document.getElementById('issueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const location = document.getElementById('location').value;
            const description = document.getElementById('description').value;
            const fileInput = document.getElementById('fileInput');
            const formData = new FormData();
            formData.append('title', title);
            formData.append('location', location);
            formData.append('description', description);
            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }
            try {
                const response = await fetch(`${API_URL}/api/issues`, { method: 'POST', body: formData });
                if (response.ok) {
                    showToast('Issue posted successfully!');
                    document.getElementById('issueForm').reset();
                    document.getElementById('preview').innerHTML = '';
                    document.getElementById('preview').classList.remove('active');
                    loadIssues();
                } else {
                    showToast('Error posting issue');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error');
            }
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const preview = document.getElementById('preview');
                    if (file.type.startsWith('image/')) {
                        preview.innerHTML = `<img src="${evt.target.result}" style="max-width: 100%; border-radius: 12px;">`;
                    } else if (file.type.startsWith('video/')) {
                        preview.innerHTML = `<video controls src="${evt.target.result}" style="max-width: 100%; border-radius: 12px;"></video>`;
                    }
                    preview.classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        });
        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('active');
        }
        function enableAdminMode() {
            const key = document.getElementById('adminKey').value;
            if (key === 'HcjQSGYfNL1M6Ynknqi0') {
                adminMode = true;
                localStorage.setItem('adminKey', key);
                toggleAdmin();
                loadIssues();
                showToast('Admin mode enabled - delete buttons visible');
            } else {
                showToast('Wrong admin key');
            }
        }
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        loadIssues();
        setInterval(loadIssues, 30000);
    </script>
</body>
</html>
